<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700&display=swap" rel="stylesheet" />
    <title>Inicio de Sesión</title>
    <link rel="stylesheet" href="style_sesion.css">
</head>

<body>

    <!--Cabecera de la pagina-->
    <header>
        <!-- Logo de la pagina -->
        <div class="logo">
            <img src="assest_encabezado/Group 55.svg" alt="logotipo de la empresa" />
        </div>

    </header>

    <div class="background-grid">
        <img src="Cars_01_1_5x 1.png" alt="">
        <img src="Cars_01_1_5x 2.png" alt="">
        <img src="Cars_02_1_5x 1.png" alt="">
        <img src="Cars_04_1_5x 1.png" alt="">
        
    </div>

    <div class="login-container">
        <div class="login-box">
            <p class="title">Iniciar sesión o registrarse</p>
            <img src="assest/Group 54.jpg" alt="Logo" class="logo" />
            <input type="text" placeholder="Usuario" />
            <input type="password" placeholder="Contraseña" />
            <button>Entrar</button>
            <p class="register-link">¿No tienes cuenta aún? <span>Click aquí</span></p>
        </div>
    </div>
</body>

</html>
